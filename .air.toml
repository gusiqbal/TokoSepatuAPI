root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/api"
  delay = 500
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "unittest"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go"]
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[screen]
  clear_on_rebuild = true
  keep_scroll = true
