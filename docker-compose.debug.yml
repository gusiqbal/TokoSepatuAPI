services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.debug
    ports:
      - "40000:40000"
    command:
      - sh
      - -c
      - "CGO_ENABLED=0 go build -gcflags='all=-N -l' -o /tmp/debug-bin ./cmd/api && dlv exec /tmp/debug-bin --headless --listen=:40000 --api-version=2 --accept-multiclient --continue"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - "apparmor=unconfined"
